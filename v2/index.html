<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>同意書線上補簽系統 - LINE 手機版</title>
    <link rel="stylesheet" href="styles.css?v=v2-3" />
  </head>
  <body data-page="shared">
    <header class="topbar shared-topbar">
      <div class="hero-copy">
        <p class="eyebrow">同意書線上補簽系統</p>
        <h1>LINE 手機版</h1>
        <p class="hero-hint">老師與家長使用同一頁。先貼上同意書圖片網址，調整簽名欄位後鎖定，再分享給家長簽名。</p>
      </div>
    </header>

    <main class="shared-main">
      <section id="uploadPanel" class="panel flow-panel">
        <div class="section-title">
          <span>1</span>
          <h2>貼上同意書圖片網址</h2>
        </div>
        <p id="modeSummary" class="hint"></p>
        <div id="uploadZone" class="upload url-upload paste-zone" tabindex="0">
          <strong>貼上 LINE 分享圖片網址</strong>
          <small>可直接貼上公開圖片網址，或在這一區按 Ctrl+V / 長按貼上圖片，再按下方按鈕載入同意書。</small>
          <div class="url-input-row">
            <input id="imageUrlInput" type="url" inputmode="url" placeholder="https://..." autocomplete="off" />
            <button id="loadImageUrl" class="primary" type="button">載入圖片</button>
          </div>
        </div>
        <p id="uploadStatus" class="status"></p>
      </section>

      <section class="document-shell shared-preview">
        <div class="section-title">
          <span>2</span>
          <h2>簽名欄位預覽</h2>
        </div>
        <div class="share-toolbar compact-toolbar">
          <button id="lockField" type="button">確認欄位並鎖定</button>
        </div>
        <p class="hint">未鎖定時可拖曳與縮放簽名欄位；鎖定後就只保留簽名。</p>
        <p id="layoutHint" class="hint"></p>
        <div id="doc" class="document shared-doc">
          <canvas id="docCanvas" class="doc-canvas"></canvas>
          <div id="fieldLayer" class="field-layer"></div>
        </div>

        <div class="section-title">
          <span>3</span>
          <h2>手寫簽名欄</h2>
        </div>
        <p id="signerHint" class="hint"></p>
        <div class="signature-pad-wrap">
          <canvas id="signaturePad" width="640" height="220" aria-label="手寫簽名欄"></canvas>
        </div>
        <div class="toolbar">
          <button id="clearSignature" type="button">清除簽名</button>
          <button id="applySignature" class="primary" type="button">套用簽名</button>
        </div>
      </section>

      <section class="panel flow-panel signer-panel">
        <div class="section-title sub-title">
          <span>4</span>
          <h2>下載圖片或分享給老師</h2>
        </div>
        <div class="share-actions">
          <button id="downloadImage" class="primary" type="button">下載已簽名圖片</button>
          <button id="shareImage" type="button">分享到通訊軟體</button>
        </div>
        <p id="signStatus" class="status"></p>
        <img id="completedImage" class="completed-image" alt="已簽名同意書預覽" />

        <div class="section-title sub-title">
          <span>5</span>
          <h2>分享網址</h2>
        </div>
        <div class="share-toolbar compact-toolbar">
          <button id="copyLink" class="primary" type="button" hidden>複製分享網址</button>
        </div>
        <div id="qrPanel" class="qr-panel" hidden>
          <div id="qrCode" class="qr-code" aria-label="分享網址 QR code"></div>
        </div>
        <p id="shareStatus" class="status"></p>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js?v=v2-3"></script>
  </body>
</html>
