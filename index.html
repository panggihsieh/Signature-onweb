<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>老師端 - 線上補簽同意書</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="teacher">
    <header class="topbar">
      <div>
        <p class="eyebrow">同意書線上補簽系統@codex_app</p>
        <h1>老師端排版</h1>
      </div>
    </header>

    <main>
      <section id="teacherView" class="teacher-flow active" aria-label="老師端排版">
        <section class="panel flow-panel">
          <div class="section-title">
            <span>1</span>
            <h2>建立同意書</h2>
          </div>
          <p class="hint">上傳或貼上同意書原稿，系統會顯示預覽並保留簽名欄位位置。</p>
          <label id="teacherPasteZone" class="upload paste-zone upload-dropzone" tabindex="0">
            <input id="fileInput" type="file" accept="image/*,application/pdf,.pdf" />
            <strong>選擇、拖曳或貼上圖片/PDF</strong>
            <small>每次上傳上限 5MB，PDF 第一頁會作為簽名底圖。也可按 Ctrl+V、右鍵或長按貼上同意書圖片。</small>
          </label>
          <div class="upload-actions">
            <button id="teacherUploadBtn" type="button" class="primary">上傳題圖</button>
            <button id="teacherPasteBtn" type="button">貼上題圖</button>
          </div>
          <p id="uploadStatus" class="status">請先上傳圖片或 PDF 同意書。</p>
        </section>

        <section class="document-shell teacher-preview-block">
          <div class="section-title">
            <span>2</span>
            <h2>老師端預覽與欄位編排</h2>
          </div>
          <p class="hint">拖曳簽名框可移動位置，拉動角落控制點可調整大小。</p>
          <div class="doc-actions">
            <p>同意書預覽</p>
          </div>
          <div id="teacherDoc" class="document teacher-doc">
            <canvas id="teacherCanvas" class="doc-canvas"></canvas>
            <div id="fieldLayer" class="field-layer"></div>
          </div>
        </section>

        <section class="panel flow-panel">
          <div class="section-title">
            <span>3</span>
            <h2>分享給家長</h2>
          </div>
          <p class="hint">確認簽名欄位位置後，產生家長端連結與 QR Code，家長可開啟同一簽名頁完成補簽。</p>
          <button id="copyLink" class="primary full" type="button">複製家長端分享連結</button>
          <textarea id="parentLink" class="visually-hidden" rows="1" readonly tabindex="-1"></textarea>
          <div id="qrPanel" class="qr-panel" hidden>
            <div id="qrCode" class="qr-code" aria-label="家長端分享連結 QR code"></div>
            <button id="downloadQrCode" type="button" class="full">下載 QR Code</button>
          </div>
          <p id="caseStatus" class="status"></p>
        </section>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
